services:
  db:
    image: mysql:8.0
    container_name: shramsetu-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shramsetu
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema_mysql.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seed_mysql.sql:/docker-entrypoint-initdb.d/2_seed.sql

volumes:
  mysql_data:
